<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>La Palma - AR Menu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-hero">
            <div class="splash-overlay"></div>
            <div class="splash-content">
                <h2>Time for a coffee break....</h2>
                <p>Your daily dose of fresh brew delivered to your doorstep. Start your coffee journey now!</p>
                <div class="splash-indicator" aria-hidden="true">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dash"></span>
                </div>
                <button id="splash-start-btn" class="splash-start-btn">Get Started</button>
            </div>
        </div>
    </div>

    <!-- Landing Page -->
    <div id="landing-page" class="hidden">
        <div class="container">
            <div class="logo">
                <h1>La Palma</h1>
            </div>
            <p class="tagline">the taste of time</p>
            
            <div id="menu-grid">
                <!-- Menu items will be loaded dynamically by category -->
            </div>
            
            <button id="start-ar-btn" class="ar-button">
                <span class="camera-icon">📷</span>
                View in AR
            </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader"></div>
        <p id="loading-text">Loading AR Experience...</p>
    </div>

    <script src="menu-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
